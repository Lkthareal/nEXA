<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Aggressive fix for "TypeError: Cannot set property fetch of #<Window> which has only a getter"
      (function() {
        try {
          if (typeof window !== 'undefined' && window.fetch) {
            var f = window.fetch;
            try {
              delete window.fetch;
            } catch (e) {}
            window.fetch = f;
          }
        } catch (e) {
          console.warn('Fetch fix failed:', e);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
