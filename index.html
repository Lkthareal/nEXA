<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Fix for "TypeError: Cannot set property fetch of #<Window> which has only a getter"
      // Some dependencies try to overwrite fetch, which fails if it's only a getter in this environment.
      (function() {
        if (typeof window !== 'undefined' && window.fetch) {
          var originalFetch = window.fetch;
          try {
            Object.defineProperty(window, 'fetch', {
              value: originalFetch,
              writable: true,
              configurable: true,
              enumerable: true
            });
          } catch (e) {
            console.warn('Could not re-define fetch as writable in index.html:', e);
          }
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
